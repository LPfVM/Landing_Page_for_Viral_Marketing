name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop lpfvm-web || true
            docker rm lpfvm-web || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lpfvm-web:latest
            docker run -d \
              --name lpfvm-web \
              -p 8000:8000 \
              --env-file ~/Landing_Page_for_Viral_Marketing/.env \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/lpfvm-web:latest
